<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yellow Kangaroo — DACH Launch Playbook</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,700;9..144,800;9..144,900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --cream:#F4F0E8;--white:#FAFAF7;--dark:#111111;--yellow:#F5C800;
  --yellow-light:#FFF8D6;--yellow-muted:rgba(245,200,0,0.15);
  --grey:#666666;--grey-light:#E8E4DC;--grey-ul:#F0EDE6;
  --green:#2D6A4F;--green-light:#D8F3DC;
  --red:#D62828;--red-light:#FFE0E0;
  --blue:#1D3557;--blue-light:#D6E8F0;
  --radius:14px;--radius-sm:8px;
}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--dark);line-height:1.6;overflow-x:hidden}
h1,h2,h3,h4{font-family:'Fraunces',serif;font-weight:700}

/* --- HEADER --- */
.header{position:sticky;top:0;z-index:100;background:var(--dark);color:#fff;padding:14px 24px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 2px 24px rgba(0,0,0,.18)}
.header-logo{display:flex;align-items:center;gap:12px}
.logo-mark{width:34px;height:34px;border-radius:var(--radius-sm);background:var(--yellow);display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;font-weight:900;font-size:17px;color:var(--dark)}
.logo-text h1{font-size:17px;letter-spacing:-.5px}
.logo-text span{font-size:10px;color:rgba(255,255,255,.45);text-transform:uppercase;letter-spacing:1.5px}
.hamburger{display:none;background:none;border:none;color:#fff;font-size:26px;cursor:pointer;padding:4px 8px}

/* --- LAYOUT --- */
.layout{display:flex;min-height:calc(100vh - 62px)}

/* --- SIDEBAR --- */
.sidebar{width:224px;min-width:224px;background:var(--white);border-right:1px solid var(--grey-light);padding:14px 0;position:sticky;top:62px;height:calc(100vh - 62px);overflow-y:auto;transition:transform .3s}
.sidebar::-webkit-scrollbar{width:4px}
.sidebar::-webkit-scrollbar-thumb{background:var(--grey-light);border-radius:4px}
.nav-btn{display:flex;align-items:center;gap:10px;width:100%;padding:10px 20px;border:none;background:transparent;color:var(--grey);font-weight:500;font-size:13px;font-family:'DM Sans',sans-serif;cursor:pointer;text-align:left;border-right:3px solid transparent;transition:all .15s}
.nav-btn:hover{background:var(--grey-ul);color:var(--dark)}
.nav-btn.active{background:var(--yellow-light);color:var(--dark);font-weight:700;border-right-color:var(--yellow)}
.nav-icon{font-size:13px;opacity:.5;width:18px;text-align:center}
.nav-btn.active .nav-icon{opacity:1}

/* --- MAIN --- */
.main{flex:1;padding:36px 44px;max-width:980px;min-width:0}

/* --- SECTIONS --- */
.section{display:none;animation:fadeUp .45s ease}
.section.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}

/* --- COMPONENTS --- */
.section-title{margin-bottom:30px}
.section-title h2{font-size:30px;line-height:1.15}
.section-title p{font-size:14.5px;color:var(--grey);margin-top:8px;max-width:680px}
.section-title .bar{width:56px;height:3px;background:var(--yellow);border-radius:2px;margin-top:16px}

.card{background:var(--white);border:1px solid var(--grey-light);border-radius:var(--radius);padding:22px;margin-bottom:14px;transition:box-shadow .2s}
.card:hover{box-shadow:0 4px 20px rgba(0,0,0,.04)}
.card-accent-left{border-left:4px solid var(--yellow)}

.stat-grid{display:flex;flex-wrap:wrap;gap:14px;margin-bottom:28px}
.stat-card{background:var(--white);border:1px solid var(--grey-light);border-radius:var(--radius);padding:22px 18px;flex:1 1 190px;min-width:170px;position:relative;overflow:hidden}
.stat-card .accent{position:absolute;top:0;left:0;width:4px;height:100%;border-radius:var(--radius) 0 0 var(--radius)}
.stat-label{font-size:11px;color:var(--grey);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:6px}
.stat-value{font-family:'Fraunces',serif;font-size:26px;font-weight:800;line-height:1.1}
.stat-sub{font-size:12.5px;color:var(--grey);margin-top:5px}

.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:.4px}
.badge-green{color:var(--green);background:var(--green-light)}
.badge-blue{color:var(--blue);background:var(--blue-light)}
.badge-red{color:var(--red);background:var(--red-light)}
.badge-dark{color:#fff;background:var(--dark)}
.badge-yellow{color:var(--dark);background:var(--yellow-light)}
.badge-grey{color:var(--dark);background:var(--grey-light)}
.badge-amber{color:#92400E;background:#FEF3C7}

.tbl-wrap{overflow-x:auto;border-radius:var(--radius);border:1px solid var(--grey-light);margin-bottom:16px}
table{width:100%;border-collapse:collapse;font-size:13px}
thead tr{background:var(--yellow-light)}
th{padding:11px 15px;text-align:left;font-weight:600;font-size:11.5px;text-transform:uppercase;letter-spacing:.8px;color:var(--dark);border-bottom:2px solid var(--grey-light)}
td{padding:9px 15px;border-bottom:1px solid var(--grey-light)}
tbody tr:nth-child(even){background:var(--grey-ul)}
tbody tr:nth-child(odd){background:var(--white)}
.tbl-blue thead tr{background:var(--blue-light)}
.tbl-green thead tr{background:var(--green-light)}

.progress-row{margin-bottom:14px}
.progress-header{display:flex;justify-content:space-between;font-size:13px;margin-bottom:5px}
.progress-header .lbl{font-weight:500}
.progress-header .val{color:var(--grey)}
.progress-track{height:8px;background:var(--grey-light);border-radius:4px;overflow:hidden}
.progress-fill{height:100%;border-radius:4px;transition:width 1.2s ease}

.callout{background:var(--yellow-light);border:2px solid var(--yellow);border-radius:var(--radius);padding:18px 22px;margin-top:18px}
.callout-title{font-weight:700;margin-bottom:6px}
.callout p,.callout div{font-size:14px;line-height:1.65}

.tab-bar{display:flex;gap:8px;margin-bottom:22px;flex-wrap:wrap}
.tab-btn{padding:9px 20px;border-radius:24px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:600;font-size:13px;transition:all .2s;background:var(--grey-light);color:var(--dark)}
.tab-btn.active{background:var(--dark);color:#fff}

.grid-2{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px}
.grid-3{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:14px}

.item-row{display:flex;align-items:flex-start;gap:14px;padding:8px 0 8px 0}
.item-num{font-family:'Fraunces',serif;font-size:26px;font-weight:800;color:var(--yellow);min-width:38px}
.arrow{color:var(--yellow);margin-right:6px;font-weight:700}
.arrow-green{color:var(--green)}
.arrow-red{color:var(--red)}

.rank-card{display:flex;gap:18px;align-items:flex-start;margin-bottom:14px}
.rank-num{font-family:'Fraunces',serif;font-size:46px;font-weight:900;line-height:1;min-width:48px}

.reveal{opacity:0;transform:translateY(20px);transition:opacity .55s ease,transform .55s ease}
.reveal.visible{opacity:1;transform:translateY(0)}

.metric-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px}
.metric-box{background:var(--grey-ul);border-radius:var(--radius);padding:14px;text-align:center}
.metric-box .icon{font-size:22px;margin-bottom:3px}
.metric-box .val{font-family:'Fraunces',serif;font-size:17px;font-weight:700}
.metric-box .lbl{font-size:10.5px;color:var(--grey);margin-top:3px}

.mono{font-family:'Courier New',monospace;background:var(--grey-ul);border-radius:var(--radius-sm);padding:10px 14px;font-size:12.5px;margin:8px 0 14px}

.priority-row{display:flex;align-items:center;gap:14px;padding:13px 18px}
.priority-num{font-family:'Fraunces',serif;font-size:19px;font-weight:800;min-width:30px;text-align:center}
.priority-badges{display:flex;gap:6px;flex-wrap:wrap;margin-top:5px}

/* --- SWOT GRID --- */
.swot-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:16px;margin-top:18px}
.swot-box{border-radius:var(--radius);padding:18px}
.swot-box .title{font-weight:700;font-size:13px;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}
.swot-item{font-size:13px;padding-left:18px;position:relative;margin-bottom:7px;line-height:1.5}
.swot-item::before{content:'→';position:absolute;left:0;font-weight:700}

/* --- MOBILE --- */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:90}
@media(max-width:800px){
  .sidebar{position:fixed;left:0;top:62px;z-index:95;transform:translateX(-100%);box-shadow:4px 0 24px rgba(0,0,0,.1)}
  .sidebar.open{transform:translateX(0)}
  .hamburger{display:block}
  .main{padding:22px 16px}
  .overlay.show{display:block}
  .stat-grid{gap:10px}
  .stat-card{padding:16px 14px}
  .stat-value{font-size:22px}
  .section-title h2{font-size:24px}
  .rank-num{font-size:34px}
}
</style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="header-logo">
    <div class="logo-mark">YK</div>
    <div class="logo-text">
      <h1>Yellow Kangaroo</h1>
      <span>DACH Launch Playbook</span>
    </div>
  </div>
  <button class="hamburger" onclick="toggleMenu()" aria-label="Menu">☰</button>
</header>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<div class="layout">
<!-- SIDEBAR -->
<nav class="sidebar" id="sidebar"></nav>

<!-- MAIN -->
<main class="main" id="main"></main>
</div>

<script>
// ─── DATA ───
const NAV = [
  {id:'overview',label:'Overview',icon:'◉'},
  {id:'keywords',label:'Keywords',icon:'◎'},
  {id:'competitors',label:'Wettbewerb',icon:'◈'},
  {id:'ads',label:'Ad Creative',icon:'◇'},
  {id:'meta',label:'Meta Ads',icon:'◆'},
  {id:'google',label:'Google Ads',icon:'◊'},
  {id:'channels',label:'Channels',icon:'○'},
  {id:'marketplace',label:'Marktplätze',icon:'□'},
  {id:'pricing',label:'Pricing',icon:'△'},
  {id:'shopify',label:'Shopify',icon:'▽'},
  {id:'communities',label:'Communities',icon:'☆'},
  {id:'lowbudget',label:'Growth Hacks',icon:'★'},
  {id:'timeline',label:'90 Tage Plan',icon:'▷'},
  {id:'priorities',label:'TOP 15',icon:'⬤'},
];
let activeSection = 'overview';
let activeTab = 'hooks';

// ─── NAVIGATION ───
function buildNav(){
  const sb = document.getElementById('sidebar');
  sb.innerHTML = NAV.map(n=>`<button class="nav-btn${n.id===activeSection?' active':''}" data-id="${n.id}"><span class="nav-icon">${n.icon}</span>${n.label}</button>`).join('');
  sb.querySelectorAll('.nav-btn').forEach(b=>b.addEventListener('click',()=>{
    activeSection=b.dataset.id;buildNav();renderSection();closeMobile();
  }));
}

function toggleMenu(){
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('show');
}
function closeMobile(){
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
}

// ─── HELPERS ───
function sTitle(title,sub){return `<div class="section-title"><h2>${title}</h2>${sub?`<p>${sub}</p>`:''}<div class="bar"></div></div>`}
function badge(text,cls='badge-green'){return `<span class="badge ${cls}">${text}</span>`}
function stat(label,value,sub,color='var(--yellow)'){return `<div class="stat-card"><div class="accent" style="background:${color}"></div><div class="stat-label">${label}</div><div class="stat-value">${value}</div>${sub?`<div class="stat-sub">${sub}</div>`:''}</div>`}
function tbl(headers,rows,cls=''){return `<div class="tbl-wrap ${cls}"><table><thead><tr>${headers.map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>${rows.map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join('')}</tr>`).join('')}</tbody></table></div>`}
function progress(label,val,color='var(--yellow)'){return `<div class="progress-row"><div class="progress-header"><span class="lbl">${label}</span><span class="val">${val}%</span></div><div class="progress-track"><div class="progress-fill" style="width:${val}%;background:${color}"></div></div></div>`}
function callout(title,body){return `<div class="callout"><div class="callout-title">${title}</div><div>${body}</div></div>`}
function card(content,extra=''){return `<div class="card ${extra}">${content}</div>`}
function arrow(text,cls='arrow'){return `<span class="${cls}">→</span> ${text}`}

// ─── SECTIONS ───
function renderSection(){
  const m=document.getElementById('main');
  m.innerHTML=`<div class="section active">${SECTIONS[activeSection]()}</div>`;
  observeReveals();
}

const SECTIONS = {
overview(){return sTitle('Market Overview','Yellow Kangaroo betritt einen jungen, schnell wachsenden Markt — mit dem einzigen Clean-Label-Energie-Mundspray in DACH.')+
`<div class="stat-grid">
${stat('Marktführer','Mouth Energy','~10.000 Retail-Doors via DHDL')}
${stat('Kategorie-Suchen/Mo','2.500–5.000','"Koffein Mundspray" DACH','var(--green)')}
${stat('Preisaufschlag YK','2,5×','vs. Mouth Energy (€9,95)','var(--red)')}
${stat('Clean-Label Leader','0','Wettbewerber im Natürlich-Segment','var(--blue)')}
</div>`+
card(`<h3 style="font-size:19px;margin-bottom:16px">Strategische Ausgangslage</h3>
<div class="swot-grid">
<div class="swot-box" style="background:var(--green-light)">
  <div class="title" style="color:var(--green)">Stärke</div>
  <div class="swot-item" style="--c:var(--green)">Einziges natürliches Spray (Guarana, Ginseng, B-Vitamine)</div>
  <div class="swot-item">AT + CH geografischer Whitespace</div>
  <div class="swot-item">Premium-Positionierung "ruhige Kontrolle"</div>
</div>
<div class="swot-box" style="background:var(--red-light)">
  <div class="title" style="color:var(--red)">Schwäche</div>
  <div class="swot-item">Höchster Einzelpreis der Kategorie (€24,50)</div>
  <div class="swot-item">Keine Retail-Präsenz</div>
  <div class="swot-item">Kein Social Proof / Reviews</div>
</div>
<div class="swot-box" style="background:var(--blue-light)">
  <div class="title" style="color:var(--blue)">Chance</div>
  <div class="swot-item">Mouth Energy Geschmacks-Schwäche (bitter/chemisch)</div>
  <div class="swot-item">Künstliche Inhaltsstoffe als Angriffsfläche</div>
  <div class="swot-item">"Natürlich"-Cluster bei Keywords unbesetzt</div>
</div>
</div>`)},

keywords(){return sTitle('Keyword-Strategie','20 High-Intent Keywords + 10 Money Keywords für sofortigen Einsatz in Google Ads & SEO.')+
`<div class="reveal"><h3 style="margin-bottom:14px">Top 10 Kategorie-Keywords</h3>`+
tbl(['Keyword','Est. Suchen/Mo','Wettbewerb','Intent'],[
['Mouth Energy (Brand)','5.000–15.000','Hoch','Conquest'],
['Kaffee Alternative','8.000–15.000','Hoch','Info/Kommerziell'],
['Energy Spray','3.000–6.000','Hoch','Gemischt'],
['Koffein Mundspray','2.500–5.000','Mittel-Hoch','Transaktional'],
['Energy Mundspray','1.500–3.000','Mittel','Transaktional'],
['Koffein Alternative','1.000–3.000','Mittel','Kommerziell'],
['Wachmacher natürlich','500–1.500','Niedrig','Kommerziell'],
['Müdigkeit bekämpfen ohne Kaffee','1.000–3.000','Niedrig','Top-of-Funnel'],
['Mittagstief überwinden','500–1.000','Niedrig','ToF'],
['Guarana Spray','100–300','Sehr niedrig','Nische'],
])+`</div>`+
`<div class="reveal"><h3 style="margin:28px 0 14px">10 Money Keywords ${badge('Google Ads Ready','badge-yellow')}</h3>`+
tbl(['Money Keyword','Est. CPC','Kaufintent'],[
['Koffein Mundspray kaufen','€0,80–1,50','⬤⬤⬤ Sehr hoch'],
['Energy Mundspray bestellen','€0,70–1,30','⬤⬤⬤ Sehr hoch'],
['Mouth Energy Alternative','€0,60–1,20','⬤⬤⬤ Conquest'],
['bestes Energy Spray','€0,70–1,40','⬤⬤⬤ Sehr hoch'],
['natürliches Koffein Spray','€0,40–0,80','⬤⬤⬤ Zero Competition'],
['Energy Spray ohne Zucker','€0,50–1,00','⬤⬤⬤ Sehr hoch'],
['Koffein Mundspray Test','€0,50–1,00','⬤⬤ Research→Purchase'],
['Koffein Mundspray Erfahrungen','€0,40–0,90','⬤⬤ Research→Purchase'],
['Energie Mundspray online kaufen','€0,60–1,20','⬤⬤⬤ Sehr hoch'],
['Guarana Mundspray kaufen','€0,30–0,70','⬤⬤⬤ Ultra-Nische'],
],'tbl-green')+`</div>`+
callout('💡 Größte Keyword-Chance','Der <strong>"natürlich"-Cluster</strong> (natürliches Koffein Mundspray, Energy Spray natürlich, Guarana Ginseng Spray) hat <strong>praktisch null Wettbewerb</strong> in Paid Search und mappt direkt auf Yellow Kangaroos USP. Sofort besetzen.')},

competitors(){return sTitle('Wettbewerbsanalyse','Pricing, Vertrieb und Schwachstellen der Top-Wettbewerber.')+
`<div class="reveal">`+
tbl(['Brand','Einzelpreis','Bundle','Pro Portion','Abo','Retail'],[
['Mouth Energy','€9,95','€17,95 (2er)','~€0,59','Keins','~10.000 Stores'],
['BEASTED','€14,99','€39,99 (3er)','~€0,70','20% Erstbest.','D2C + Amazon'],
['GUMING','€22,99 (20 Gums)','€19,98 (Trial 40)','~€0,50–0,58','11% Member','D2C + Amazon'],
['BetterYou','€8–11','Varies','~€0,30','Keins','Apotheken'],
['<strong>Yellow Kangaroo</strong>','<strong>€24,50</strong>','<strong>€45,00</strong>','TBD','TBD','Noch keins'],
])+`</div>`+
`<div class="grid-2 reveal" style="margin-top:18px">`+
card(`<div style="font-weight:700;color:var(--red);font-size:13.5px;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px">⚠ Mouth Energy Schwachstellen</div>
${['Synthetisches Koffein + 6 künstliche Süßstoffe','Bitterer/chemischer Geschmack (Amazon Reviews)','Kein Abo-Modell','Keine natürlichen Zutaten-Claims'].map(s=>`<div style="font-size:13px;margin-bottom:7px;padding-left:18px;position:relative"><span style="position:absolute;left:0;color:var(--red)">✗</span>${s}</div>`).join('')}`)+
card(`<div style="font-weight:700;color:var(--green);font-size:13.5px;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px">✓ Yellow Kangaroo Differenzierung</div>
${['100% natürliche Inhaltsstoffe (Guarana, Ginseng, B-Vitamine)','Geschmack als USP gegen ME-Schwäche','Premium-Positionierung für Professionals','Abo-Modell ab Launch geplant'].map(s=>`<div style="font-size:13px;margin-bottom:7px;padding-left:18px;position:relative"><span style="position:absolute;left:0;color:var(--green)">✓</span>${s}</div>`).join('')}`)+
`</div>`},

ads(){
const hooks=[
{n:'01',hook:'"Kennst du das? 15 Uhr, Mittagstief, null Energie..."',type:'Problem Hook'},
{n:'02',hook:'Post-It über dem Spray: "Was meinen 3. Kaffee ersetzt hat" — abziehen, Reveal',type:'Post-It Reveal'},
{n:'03',hook:'"Ehrlich, ich fand ein Energy-Mundspray absurd..."',type:'Negative/Reverse'},
{n:'04',hook:'Person im Büro ansprechen: "Müde? Probier mal das hier."',type:'Man-on-the-Street'},

{n:'06',hook:'TikTok-Kommentar: \'Ein Energy-Spray? Quatsch\' — Creator reagiert',type:'Comment Response'},
{n:'07',hook:'"Ich hab ausgerechnet: €87/Monat für Energy Drinks. Das hier: €1,20/Tag"',type:'Cost Compare'},

{n:'09',hook:'"Alle fragen mich, wie ich den ganzen Tag fokussiert bleibe..."',type:'Curiosity'},
{n:'10',hook:'"Als Ernährungsberater teste ich 200+ Supplements. Das ist anders."',type:'Expert'},
];
const angles=[
{a:'Coffee Replacement',t:'Office Workers 25–45',m:'Ersetze deinen 3. Kaffee mit 3 Sprühstößen'},
{a:'Speed & Convenience',t:'Busy Professionals',m:'Energie in 10 Sekunden — kein Mixen, keine Dose'},
{a:'Clean Energy',t:'Health-Conscious',m:'Natürliche Inhaltsstoffe. Kein Zucker. Kein Taurin.'},
{a:'Cost-per-Serve',t:'Value-Conscious',m:'Günstiger als dein täglicher Red Bull'},
{a:'Portability',t:'Pendler, Gym',m:'Passt in jede Hosentasche. Wirkt in Sekunden.'},
{a:'Afternoon Crash',t:'Office Workers',m:'Das 15-Uhr-Tief ist real. So löst man es.'},
{a:'Pre-Workout',t:'Fitness',m:'Das Pre-Workout ohne Shaker-Bottle'},
{a:'Social Proof',t:'Broad/FOMO',m:'50.000 Deutsche haben den Energy Drink ersetzt'},
{a:'Innovation',t:'Early Adopters',m:'Die Zukunft der Energie ist kein Getränk — sondern ein Spray'},
{a:'Ritual',t:'Wellness',m:'Meine Morgenroutine: 3 Sprühstöße einfacher'},
];
return sTitle('Ad Creative Strategie','10 bewährte Hooks + 10 Winning Angles für sofortige Creative-Produktion.')+
`<div class="tab-bar">
<button class="tab-btn${activeTab==='hooks'?' active':''}" onclick="activeTab='hooks';renderSection()">10 Hooks</button>
<button class="tab-btn${activeTab==='angles'?' active':''}" onclick="activeTab='angles';renderSection()">10 Angles</button>

}
